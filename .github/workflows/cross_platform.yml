name: "Cross platform tests"
permissions:
  contents: read
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test_cross_std:
    name: "Cross platform test (platforms with standard library)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Tier 1
          - aarch64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          # Tier 2
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-gnueabi
          - arm-unknown-linux-gnueabihf
          - armv7-unknown-linux-gnueabihf
          - powerpc-unknown-linux-gnu
          - powerpc64-unknown-linux-gnu
          - powerpc64le-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - s390x-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          # Tier 3
          - arm-linux-androideabi
          - arm-unknown-linux-musleabi
          - arm-unknown-linux-musleabihf
          - armv5te-unknown-linux-gnueabi
          - armv5te-unknown-linux-musleabi
          - armv7-linux-androideabi
          - armv7-unknown-linux-gnueabi
          - armv7-unknown-linux-musleabi
          - armv7-unknown-linux-musleabihf
          - i586-unknown-linux-gnu
          - i586-unknown-linux-musl
          - i686-unknown-linux-musl
          - thumbv7neon-linux-androideabi
          - thumbv7neon-unknown-linux-gnueabihf
    env:
      DECRYPTION_KEY: "12345678901234567890123456789012"
      # ARM/aarch64 C compiler overrides
      CC_aarch64_unknown_linux_gnu: "aarch64-linux-gnu-gcc"
      CFLAGS_aarch64_unknown_linux_gnu: "-O2 -march=armv8-a"
      CC_aarch64_unknown_linux_musl: "aarch64-linux-musl-gcc"
      CFLAGS_aarch64_unknown_linux_musl: "-O2 -march=armv8-a"
      CC_arm_unknown_linux_gnueabi: "arm-linux-gnueabi-gcc"
      CFLAGS_arm_unknown_linux_gnueabi: "-O2 -march=armv7-a"
      CC_arm_unknown_linux_gnueabihf: "arm-linux-gnueabihf-gcc"
      CFLAGS_arm_unknown_linux_gnueabihf: "-O2 -march=armv7-a"
      CC_armv7_unknown_linux_gnueabihf: "arm-linux-gnueabihf-gcc"
      CFLAGS_armv7_unknown_linux_gnueabihf: "-O2 -march=armv7-a"
      CC_arm_linux_androideabi: "arm-linux-androideabi-gcc"
      CFLAGS_arm_linux_androideabi: "-O2 -march=armv7-a"
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
      - name: "Install Rust stable"
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - name: "Install cargo cross"
        uses: actions-rs/install@v0.1
        with:
          crate: cross
      - name: "Run tests"
        run: cross test --target ${{ matrix.platform }}
        env:
          RUSTFLAGS: "-D warnings"
          RUST_BACKTRACE: "1"
          DECRYPTION_KEY: ${{ env.DECRYPTION_KEY }}
